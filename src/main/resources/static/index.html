<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý Sinh viên</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #ff9ecf, #ff6eb4);
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

/* Card chính */
.main-card {
    max-width: 1100px;
    margin: 50px auto;
    border-radius: 25px;
    overflow: hidden;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.85);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

/* Header */
.header {
    background: linear-gradient(90deg, #ff6eb4, #ff3d9a);
    color: white;
    padding: 30px;
    text-align: center;
}

.header h2 {
    font-weight: 700;
}

/* Form */
.form-section {
    padding: 30px;
    background: #fff0f7;
    border-radius: 20px;
}

/* Nút đẹp */
.btn-pink {
    background: #ff3d9a;
    color: white;
    border: none;
    border-radius: 25px;
    padding: 8px 20px;
    transition: 0.3s;
}

.btn-pink:hover {
    background: #e60073;
    transform: scale(1.05);
}

.btn-soft {
    border-radius: 25px;
}

/* Bảng */
.table thead {
    background: #ffd6ea;
}

.table tbody tr:hover {
    background: #fff0f7;
    transition: 0.3s;
}

.search-bar {
    border-radius: 30px;
}
</style>
</head>

<body>

<div class="main-card">

    <div class="header">
        <h2>🌸 Quản lý Sinh viên</h2>
        <p>Hệ thống quản lý sinh viên hiện đại & thân thiện</p>
    </div>

    <div class="p-4">

        <!-- FORM -->
        <div class="form-section mb-4">
            <h5>➕ Thêm / Cập nhật Sinh viên</h5>

            <input type="hidden" id="studentId">

            <div class="row mt-3">
                <div class="col-md-6">
                    <input id="name" class="form-control mb-3"
                           placeholder="Họ tên">
                </div>
                <div class="col-md-6">
                    <input id="email" class="form-control mb-3"
                           placeholder="Email">
                </div>
            </div>

            <button class="btn btn-pink btn-soft me-2"
                    onclick="saveStudent()">💾 Lưu</button>

            <button class="btn btn-outline-secondary btn-soft"
                    onclick="resetForm()">🧹 Xóa Form</button>
        </div>

        <!-- SEARCH -->
        <div class="d-flex mb-3">
            <input type="text"
                   id="search"
                   class="form-control search-bar me-2"
                   placeholder="🔎 Tìm theo tên..."
                   onkeyup="searchStudent()">

            <button class="btn btn-pink btn-soft"
                    onclick="loadStudents()">🔄 Tất cả</button>
        </div>

        <!-- TABLE -->
        <table class="table table-bordered text-center">
            <thead>
            <tr>
                <th>ID</th>
                <th>HỌ TÊN</th>
                <th>EMAIL</th>
                <th>HÀNH ĐỘNG</th>
            </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>

    </div>
</div>

<script>
const API = "http://localhost:8080/api/students";

function loadStudents() {
    fetch(API)
        .then(res => res.json())
        .then(data => {
            let html = "";
            data.forEach(s => {
                html += `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.email}</td>
                    <td>
                        <button class="btn btn-warning btn-sm me-1"
                            onclick="editStudent(${s.id}, '${s.name}', '${s.email}')">
                            ✏️
                        </button>
                        <button class="btn btn-danger btn-sm"
                            onclick="deleteStudent(${s.id})">
                            🗑
                        </button>
                    </td>
                </tr>`;
            });
            document.getElementById("studentTable").innerHTML = html;
        });
}

function saveStudent() {
    const id = document.getElementById("studentId").value;
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    const student = { name, email };

    if (id) {
        fetch(API + "/update/" + id, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(student)
        }).then(() => {
            resetForm();
            loadStudents();
        });
    } else {
        fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(student)
        }).then(() => {
            resetForm();
            loadStudents();
        });
    }
}

function deleteStudent(id) {
    if(confirm("Bạn có chắc muốn xóa?")) {
        fetch(API + "/delete/" + id, { method: "POST" })
        .then(() => loadStudents());
    }
}

function editStudent(id, name, email) {
    document.getElementById("studentId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("email").value = email;
}

function searchStudent() {
    const name = document.getElementById("search").value;
    fetch(API + "/search?name=" + name)
        .then(res => res.json())
        .then(data => {
            let html = "";
            data.forEach(s => {
                html += `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.email}</td>
                    <td>
                        <button class="btn btn-warning btn-sm me-1"
                            onclick="editStudent(${s.id}, '${s.name}', '${s.email}')">✏️</button>
                        <button class="btn btn-danger btn-sm"
                            onclick="deleteStudent(${s.id})">🗑</button>
                    </td>
                </tr>`;
            });
            document.getElementById("studentTable").innerHTML = html;
        });
}

function resetForm() {
    document.getElementById("studentId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
}

loadStudents();
</script>

</body>
</html>
