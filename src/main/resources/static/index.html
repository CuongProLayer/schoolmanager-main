<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sinh viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #5f9cff, #9c6bff);
            min-height: 100vh;
        }

        .main-card {
            max-width: 1000px;
            margin: 40px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .header {
            background: linear-gradient(90deg, #5f9cff, #9c6bff);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .table thead {
            background-color: #f1f1f1;
        }

        .btn-custom {
            border-radius: 20px;
        }

        .search-bar {
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="card main-card">

    <div class="header">
        <h2>📚 Quản lý Sinh viên</h2>
        <p>Hệ thống quản lý sinh viên - Nhanh chóng & Hiệu quả</p>
    </div>

    <div class="card-body">

        <!-- FORM -->
        <div class="form-section mb-4">
            <h5>➕ Thêm / Cập nhật Sinh viên</h5>

            <input type="hidden" id="studentId">

            <div class="row mt-3">
                <div class="col-md-6">
                    <input id="name" class="form-control" placeholder="Họ tên">
                </div>

                <div class="col-md-6">
                    <input id="email" class="form-control" placeholder="Email">
                </div>
            </div>

            <div class="mt-3">
                <button class="btn btn-primary btn-custom" onclick="saveStudent()">💾 Lưu</button>
                <button class="btn btn-secondary btn-custom" onclick="resetForm()">🧹 Xóa Form</button>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="d-flex mb-3">
            <input type="text" id="search" class="form-control search-bar me-2"
                   placeholder="🔎 Tìm theo tên..." onkeyup="searchStudent()">
            <button class="btn btn-info btn-custom" onclick="loadStudents()">🔄 Tất cả</button>
        </div>

        <!-- TABLE -->
        <table class="table table-hover table-bordered text-center">
            <thead>
            <tr>
                <th>ID</th>
                <th>HỌ TÊN</th>
                <th>EMAIL</th>
                <th>HÀNH ĐỘNG</th>
            </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>

    </div>
</div>

<script>
const API = "http://localhost:8080/api/students";

// LOAD
function loadStudents() {
    fetch(API)
        .then(res => res.json())
        .then(data => {
            let html = "";
            data.forEach(s => {
                html += `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.email}</td>
                    <td>
                        <button class="btn btn-warning btn-sm me-1"
                            onclick="editStudent(${s.id}, '${s.name}', '${s.email}')">
                            ✏️ Sửa
                        </button>
                        <button class="btn btn-danger btn-sm"
                            onclick="deleteStudent(${s.id})">
                            🗑 Xóa
                        </button>
                    </td>
                </tr>`;
            });
            document.getElementById("studentTable").innerHTML = html;
        });
}

// SAVE (ADD + UPDATE)
function saveStudent() {

    const id = document.getElementById("studentId").value;
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    const student = { name, email };

    if (id) {
        fetch(API + "/update/" + id, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(student)
        }).then(() => {
            resetForm();
            loadStudents();
        });
    } else {
        fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(student)
        }).then(() => {
            resetForm();
            loadStudents();
        });
    }
}

// DELETE
function deleteStudent(id) {
    if(confirm("Bạn có chắc muốn xóa?")) {
        fetch(API + "/delete/" + id, {
            method: "POST"
        }).then(() => loadStudents());
    }
}

// EDIT
function editStudent(id, name, email) {
    document.getElementById("studentId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("email").value = email;
}

// SEARCH
function searchStudent() {
    const name = document.getElementById("search").value;

    fetch(API + "/search?name=" + name)
        .then(res => res.json())
        .then(data => {
            let html = "";
            data.forEach(s => {
                html += `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.email}</td>
                    <td>
                        <button class="btn btn-warning btn-sm me-1"
                            onclick="editStudent(${s.id}, '${s.name}', '${s.email}')">
                            ✏️ Sửa
                        </button>
                        <button class="btn btn-danger btn-sm"
                            onclick="deleteStudent(${s.id})">
                            🗑 Xóa
                        </button>
                    </td>
                </tr>`;
            });
            document.getElementById("studentTable").innerHTML = html;
        });
}

function resetForm() {
    document.getElementById("studentId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
}

loadStudents();
</script>

</body>
</html>
